apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: webapp-config
                  key: APP_MODE
          ports:
            - containerPort: 80
